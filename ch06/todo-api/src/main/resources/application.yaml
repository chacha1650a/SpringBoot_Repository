spring:
  application:
    name: todo-api
  profiles:
    include: secret

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.korit.todoapi.entity
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

db:
  init-status:
    - roles: false